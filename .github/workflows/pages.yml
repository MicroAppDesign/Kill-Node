

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # 1. ติดตั้ง Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # 2. ติดตั้ง Dependencies และรันคำสั่ง Build เพื่อสร้างโฟลเดอร์ dist
      - name: Install and Build
        run: |
          pnpm install
          pnpm run build

      # 3. สั่ง Deploy โฟลเดอร์ที่ได้จากการ Build (เช่น dist)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # 👈 เปลี่ยนให้ตรงกับโฟลเดอร์ที่บิวด์ได้ (เช่น dist, build, หรือ out)
          publish_branch: gh-pages
